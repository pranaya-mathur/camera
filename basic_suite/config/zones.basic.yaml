# Basic suite zones (normalized coordinates 0..1)
# Camera IDs must match ingest keys: cam1–cam4 from YAML, plus `main` when using
# BASIC_MAIN_CAMERA / --use-webcam (webcam_ingest_basic uses cid "main").

cameras:
  cam1: &default_zones
    zones:
      - id: full_scene
        name: Full camera view
        polygon:
          - [0.0, 0.0]
          - [1.0, 0.0]
          - [1.0, 1.0]
          - [0.0, 1.0]
        restricted: false
        crowd_max: 3
        loitering_seconds: 20
        loitering_min_persons: 1

      - id: perimeter_top
        name: Perimeter top strip
        polygon:
          - [0.0, 0.0]
          - [1.0, 0.0]
          - [1.0, 0.18]
          - [0.0, 0.18]
        restricted: true
        schedule:
          timezone: Asia/Kolkata
          windows:
            - start: "22:00"
              end: "06:00"

      - id: driveway
        name: Driveway no-vehicle zone
        polygon:
          - [0.0, 0.70]
          - [1.0, 0.70]
          - [1.0, 1.0]
          - [0.0, 1.0]
        hoa_vehicle_violation: true
        hoa_vehicle_labels:
          - car
          - motorcycle
          - scooter

  main: *default_zones
  cam2: *default_zones
  cam3: *default_zones
  cam4: *default_zones
