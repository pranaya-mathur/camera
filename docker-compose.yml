
version: '3'
services:
  redis:
    image: redis:7
    ports: ["6379:6379"]
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes: ["./backend:/app/backend"]
    ports: ["8000:8000"]
    environment:
      PYTHONPATH: /app
      REDIS_HOST: redis
    depends_on: [redis]
  ingest:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    command: python ingest.py
    volumes: ["./pipeline:/app", "./models:/app/models"]
    environment:
      REDIS_HOST: redis
    depends_on: [redis]
  motion:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    command: python motion.py
    volumes: ["./pipeline:/app"]
    environment:
      REDIS_HOST: redis
    depends_on: [redis]
  detect:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    command: python detect.py
    volumes: ["./pipeline:/app", "./models:/app/models"]
    environment:
      REDIS_HOST: redis
    depends_on: [redis]
  rules:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    command: python rules.py
    volumes: ["./pipeline:/app"]
    environment:
      REDIS_HOST: redis
    depends_on: [redis]
  ui:
    build: ./ui
    command: npm run dev -- --host
    volumes: ["./ui:/app"]
    ports: ["5173:5173"]
