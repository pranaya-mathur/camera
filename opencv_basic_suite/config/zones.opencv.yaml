# OpenCV Basic Suite Zones
# This defines polygon regions for intrusion and loitering.
# Coordinates are normalized (0.0 to 1.0).

cameras:
  "0": # Webcam index 0
    zones:
      - id: "entry_zone"
        name: "Main Entrance"
        polygon:
          - [0.1, 0.1]
          - [0.9, 0.1]
          - [0.9, 0.9]
          - [0.1, 0.9]
        restricted: true
        loitering_seconds: 30
      - id: "test_zone"
        name: "Testing Area"
        polygon:
          - [0.3, 0.3]
          - [0.6, 0.3]
          - [0.6, 0.6]
          - [0.3, 0.6]
        restricted: false
        loitering_seconds: 15
