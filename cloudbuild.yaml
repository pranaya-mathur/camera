steps:
  # 1. Build the basic-suite container
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/securevu-basic-suite:latest',
      '-t', 'gcr.io/$PROJECT_ID/securevu-basic-suite:$SHORT_SHA',
      '-f', 'basic_suite/Dockerfile',
      '.'
    ]

  # 2. Push to Container Registry (GCR)
  # Note: Use Artifact Registry if GCR is deprecated in the target project.
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/securevu-basic-suite:latest']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/securevu-basic-suite:$SHORT_SHA']

images:
  - 'gcr.io/$PROJECT_ID/securevu-basic-suite:latest'
  - 'gcr.io/$PROJECT_ID/securevu-basic-suite:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
