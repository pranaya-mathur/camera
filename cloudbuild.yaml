steps:
  # 1. Build the basic-suite container
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/securevu-basic-suite:latest',
      '-f', 'basic_suite/Dockerfile',
      '.'
    ]

  # 2. Push to Container Registry (GCR)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/securevu-basic-suite:latest']

  # 3. Deploy to GCE (Update existing container)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'compute', 'instances', 'update-container', 'securevu-pilot-vm',
      '--project=$PROJECT_ID',
      '--zone=us-central1-a',
      '--container-image=gcr.io/$PROJECT_ID/securevu-basic-suite:latest'
    ]

images:
  - 'gcr.io/$PROJECT_ID/securevu-basic-suite:latest'

options:
  logging: CLOUD_LOGGING_ONLY
